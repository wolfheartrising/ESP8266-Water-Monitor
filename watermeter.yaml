esphome:
  name: watermeter
  friendly_name: WaterMeter

esp8266:
  board: esp01_1m

logger:

api:
  encryption:
    key: "[encryption key here]"

ota:
  - platform: esphome
    password: "[ota password here]"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "Watermeter Fallback Hotspot"
    password: "[fallback password here]"

captive_portal:

# ---------------------------------------------------
# LED on GPIO2 (pulse indicator)
# ---------------------------------------------------
output:
  - platform: gpio
    pin: GPIO2
    id: led_output
    inverted: false

light:
  - platform: binary
    output: led_output
    id: pulse_led
    name: "Pulse LED"
    restore_mode: ALWAYS_OFF

# ---------------------------------------------------
# Globals
# ---------------------------------------------------
globals:
  - id: meter_offset_ft3
    type: float
    restore_value: yes
    initial_value: '39746.165'

  - id: pulse_daily_offset
    type: int
    restore_value: yes
    initial_value: '0'

# ---------------------------------------------------
# Time (for midnight reset)
# ---------------------------------------------------
time:
  - platform: homeassistant
    id: ha_time

# ---------------------------------------------------
# Sensors
# ---------------------------------------------------
sensor:

  # --- Main pulse counter (hardware) ---
  - platform: pulse_counter
    id: pulse_rate
    name: "Pulse Rate"
    pin:
      number: GPIO4
      mode:
        input: true
        pullup: true
    internal_filter: 20ms
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    unit_of_measurement: "pulses/min"
    accuracy_decimals: 2
    update_interval: 1s

    total:
      id: pulse_total
      name: "Pulse Total"
      unit_of_measurement: "pulses"
      accuracy_decimals: 0
      
      # HARDENING: never allow pulse_total to decrease
      filters:
        - lambda: |-
            static float last = 0;
            if (x < last) return last;
            last = x;
            return x;

  # --- Physical meter reading from HA ---
  - platform: homeassistant
    id: ha_physical_meter_ft3
    entity_id: input_number.water_meter_physical

  # --- Raw cubic feet from pulses ---
  - platform: template
    id: cubic_feet_total_raw
    name: "Total Water Used Raw (Cubic Feet)"
    unit_of_measurement: "ft³"
    accuracy_decimals: 3
    lambda: |-
      return id(pulse_total).state * 0.001177f;

  # --- Corrected cubic feet total (with offset) ---
  - platform: template
    id: cubic_feet_total
    name: "Total Water Used (Cubic Feet)"
    unit_of_measurement: "ft³"
    accuracy_decimals: 3
    lambda: |-
      return id(cubic_feet_total_raw).state + id(meter_offset_ft3);

  # --- Cubic feet rate ---
  - platform: template
    id: cubic_feet_rate
    name: "Water Flow Rate (Cubic Feet/min)"
    unit_of_measurement: "ft³/min"
    accuracy_decimals: 4
    lambda: |-
      return id(pulse_rate).state * 0.001177f;

  # --- Total gallons ---
  - platform: template
    id: gallons_total
    name: "Total Water Used (Gallons)"
    unit_of_measurement: "gal"
    accuracy_decimals: 2
    lambda: |-
      return id(pulse_total).state * 0.00881f;

  # --- Gallons rate ---
  - platform: template
    id: gallons_rate
    name: "Water Flow Rate (Gallons/min)"
    unit_of_measurement: "gal/min"
    accuracy_decimals: 2
    lambda: |-
      return id(pulse_rate).state * 0.00881f;

  # --- Daily pulses (CLAMPED) ---
  - platform: template
    id: daily_pulses
    name: "Daily Pulse Count"
    unit_of_measurement: "pulses"
    accuracy_decimals: 0
    lambda: |-
      float pulses = id(pulse_total).state - id(pulse_daily_offset);
      if (pulses < 0) pulses = 0;
      return pulses;

  # --- Daily gallons (CLAMPED) ---
  - platform: template
    id: daily_gallons
    name: "Daily Water Used (Gallons)"
    unit_of_measurement: "gal"
    accuracy_decimals: 2
    lambda: |-
      float pulses = id(pulse_total).state - id(pulse_daily_offset);
      if (pulses < 0) pulses = 0;
      return pulses * 0.00881f;

  # --- Daily cubic feet (CLAMPED) ---
  - platform: template
    id: daily_cubic_feet
    name: "Daily Water Used (Cubic Feet)"
    unit_of_measurement: "ft³"
    accuracy_decimals: 3
    lambda: |-
      float pulses = id(pulse_total).state - id(pulse_daily_offset);
      if (pulses < 0) pulses = 0;
      return pulses * 0.001177f;

# ---------------------------------------------------
# Sync button (ESPHome ↔ physical meter)
# ---------------------------------------------------
button:
  - platform: template
    id: sync_to_physical
    name: "Sync Water Meter to Physical Reading"
    on_press:
      then:
        - lambda: |-
            float physical = id(ha_physical_meter_ft3).state;
            float raw_ft3 = id(pulse_total).state * 0.001177f;
            id(meter_offset_ft3) = physical - raw_ft3;

# ---------------------------------------------------
# Interval tasks (LED blink + midnight reset)
# ---------------------------------------------------
interval:

  # LED blink every 0.1 ft³ (85 pulses)
  - interval: 100ms
    then:
      - lambda: |-
          static int last_blink_pulse = 0;
          int pulses = (int) id(pulse_total).state;

          const int pulses_per_blink = 85;

          if (pulses >= last_blink_pulse + pulses_per_blink) {
            last_blink_pulse = pulses;
            id(led_output).turn_on();
            delay(50);
            id(led_output).turn_off();
          }

  # Midnight daily reset
  - interval: 1min
    then:
      - lambda: |-
          auto t = id(ha_time).now();
          if (t.is_valid() && t.hour == 0 && t.minute == 0) {
            id(pulse_daily_offset) = (int) id(pulse_total).state;
          }